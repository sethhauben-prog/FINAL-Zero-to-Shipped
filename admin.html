<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Zero to Shipped</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=IBM+Plex+Mono:wght@300;400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f6f1;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dbd0;
  --royal: #1a3db5;
  --royal-dark: #142e8a;
  --gold: #c9922a;
  --text: #1a1a1a;
  --text-muted: #6b6660;
  --text-dim: #a09b94;
  --green: #1a7a4a;
  --red: #c0392b;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
.site-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-logo { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; font-style: italic; color: var(--text); text-decoration: none; }
.nav-logo em { color: var(--royal); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; background: var(--royal); color: #fff; padding: 4px 10px; border-radius: 2px; }
.nav-btn { font-family: 'Manrope', sans-serif; font-size: 12px; font-weight: 700; padding: 8px 18px; border-radius: 50px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); cursor: pointer; transition: background 0.15s; text-decoration: none; }
.nav-btn:hover { background: var(--surface2); }

/* HERO */
.page-hero {
  background: var(--royal);
  color: #fff;
  padding: 36px 24px 40px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.page-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 50% 80% at 80% 20%, rgba(201,146,42,0.18) 0%, transparent 60%);
}
.hero-eyebrow { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(201,146,42,0.4); padding: 5px 14px; border-radius: 2px; margin-bottom: 16px; position: relative; }
.hero-heading { font-family: 'Playfair Display', serif; font-size: clamp(28px, 4vw, 48px); font-weight: 900; line-height: 1; letter-spacing: -0.02em; position: relative; margin-bottom: 10px; }
.hero-heading em { font-style: italic; color: var(--gold); }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.6); max-width: 460px; margin: 0 auto; line-height: 1.7; position: relative; }

/* MAIN */
.main-section { flex: 1; max-width: 1100px; margin: 0 auto; padding: 48px 24px 80px; width: 100%; }

/* STATS ROW */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 40px; }
@media (max-width: 760px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; }
.stat-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
.stat-value { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
.stat-value.blue { color: var(--royal); }
.stat-value.gold { color: var(--gold); }
.stat-value.green { color: var(--green); }

/* SECTION */
.section-heading { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 16px; }

/* TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 40px; }
table { width: 100%; border-collapse: collapse; }
thead { background: var(--surface2); }
th { font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); padding: 12px 20px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { font-size: 13px; color: var(--text-muted); padding: 14px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf9f7; }
.td-name { font-weight: 700; color: var(--text); }
.td-email { font-family: 'IBM Plex Mono', monospace; font-size: 11px; }
.role-badge { display: inline-block; font-family: 'IBM Plex Mono', monospace; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
.role-admin { background: rgba(26,61,181,0.1); border: 1px solid rgba(26,61,181,0.25); color: var(--royal); }
.role-user { background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
.role-select { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text); background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; cursor: pointer; }
.role-select:focus { outline: none; border-color: var(--royal); }

/* LOADING / EMPTY */
.loading { text-align: center; padding: 48px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; font-size: 12px; }

footer { background: var(--text); color: rgba(255,255,255,0.4); text-align: center; padding: 28px 24px; font-size: 12px; }
footer .ft { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; font-style: italic; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
</style>
</head>
<body>

<nav class="site-nav">
  <a href="dashboard.html" class="nav-logo">Zero to <em>Shipped</em></a>
  <div class="nav-right">
    <span class="nav-badge">Admin</span>
    <a href="dashboard.html" class="nav-btn">← Dashboard</a>
    <button class="nav-btn" id="logout-btn">Log Out</button>
  </div>
</nav>

<section class="page-hero">
  <div class="hero-eyebrow">✦ Admin Panel</div>
  <h1 class="hero-heading">Zero to <em>Shipped</em></h1>
  <p class="hero-sub">User management, completion stats, and platform overview.</p>
</section>

<section class="main-section">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Users</div>
      <div class="stat-value blue" id="stat-users">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Admins</div>
      <div class="stat-value gold" id="stat-admins">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Joined This Week</div>
      <div class="stat-value green" id="stat-week">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Joined Today</div>
      <div class="stat-value" id="stat-today">—</div>
    </div>
  </div>

  <div class="section-heading">All Users</div>
  <div class="table-wrap">
    <div class="loading" id="table-loading">Loading users…</div>
    <table id="users-table" style="display:none;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Joined</th>
          <th>Change Role</th>
        </tr>
      </thead>
      <tbody id="users-tbody"></tbody>
    </table>
  </div>

</section>

<footer>
  <div class="ft">Zero to Shipped</div>
  Admin Panel · Build Real Things with AI
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script>
(async function () {

  // ── AUTH GUARD ──
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  // ── ROLE CHECK ──
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('role')
    .eq('id', session.user.id)
    .single();

  if (!profile || profile.role !== 'admin') {
    window.location.href = 'dashboard.html';
    return;
  }

  // ── LOGOUT ──
  document.getElementById('logout-btn').addEventListener('click', async function () {
    await supabaseClient.auth.signOut();
    window.location.href = 'login.html';
  });

  // ── LOAD USERS ──
  const { data: users, error } = await supabaseClient
    .from('profiles')
    .select('*')
    .order('created_at', { ascending: false });

  if (error || !users) {
    document.getElementById('table-loading').textContent = 'Failed to load users.';
    return;
  }

  // ── STATS ──
  const now = new Date();
  const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
  const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  document.getElementById('stat-users').textContent = users.length;
  document.getElementById('stat-admins').textContent = users.filter(function(u) { return u.role === 'admin'; }).length;
  document.getElementById('stat-week').textContent = users.filter(function(u) { return new Date(u.created_at) >= weekAgo; }).length;
  document.getElementById('stat-today').textContent = users.filter(function(u) { return new Date(u.created_at) >= todayStart; }).length;

  // ── RENDER TABLE ──
  const tbody = document.getElementById('users-tbody');
  users.forEach(function(user) {
    const tr = document.createElement('tr');
    const joined = new Date(user.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    tr.innerHTML =
      '<td class="td-name">' + (user.full_name || '—') + '</td>' +
      '<td class="td-email">' + (user.email || '—') + '</td>' +
      '<td><span class="role-badge role-' + user.role + '">' + user.role + '</span></td>' +
      '<td>' + joined + '</td>' +
      '<td>' +
        '<select class="role-select" data-id="' + user.id + '">' +
          '<option value="user"' + (user.role === 'user' ? ' selected' : '') + '>user</option>' +
          '<option value="admin"' + (user.role === 'admin' ? ' selected' : '') + '>admin</option>' +
        '</select>' +
      '</td>';
    tbody.appendChild(tr);
  });

  // ── ROLE CHANGE ──
  tbody.addEventListener('change', async function(e) {
    if (!e.target.classList.contains('role-select')) return;
    const userId = e.target.dataset.id;
    const newRole = e.target.value;
    const { error } = await supabaseClient
      .from('profiles')
      .update({ role: newRole })
      .eq('id', userId);
    if (error) {
      alert('Failed to update role: ' + error.message);
      return;
    }
    // Update badge in same row
    const badge = e.target.closest('tr').querySelector('.role-badge');
    badge.className = 'role-badge role-' + newRole;
    badge.textContent = newRole;
  });

  document.getElementById('table-loading').style.display = 'none';
  document.getElementById('users-table').style.display = 'table';

})();
</script>

</body>
</html>
